name: worknest

services:
  # =============================================
  # Backend - Node.js API
  # =============================================
  server:
    build:
      context: ./server
      target: production
    container_name: worknest-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5500
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5500/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # =============================================
  # Frontend - React/Vite → Nginx
  # =============================================
  client:
    build:
      context: ./client
      target: production
    container_name: worknest-client
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

networks:
  backend:
    driver: bridge
