name: ✨ Feature request
description: Propose a new feature or improvement.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should we build? Sketches, mocks, or examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What other approaches did you weigh? Why is the proposal preferred?
        (See `docs/adr/` for the kind of trade-off thinking we like.)
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Frontend (client)
        - Backend (server / API)
        - Cross-cutting
        - Documentation / DX
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues and discussions.
          required: true
