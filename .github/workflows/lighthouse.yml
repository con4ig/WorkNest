name: Lighthouse CI

on:
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/lighthouse.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/lighthouse.yml"

# One active run per ref.
concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        # `lhci autorun` reads `lighthouserc.cjs`, boots `serve dist`,
        # probes the configured URLs, asserts budgets, and uploads a
        # public report whose URL is dropped into the run summary so
        # reviewers can click through from the PR check.
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: client/.lighthouseci
          retention-days: 14
