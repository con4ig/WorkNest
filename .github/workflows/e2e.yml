name: E2E (Playwright)

on:
  pull_request:
    paths:
      - "client/**"
      - "server/**"
      - "e2e/**"
      - "playwright.config.js"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - "server/**"
      - "e2e/**"
      - "playwright.config.js"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Provide a real MongoDB instance — the demo-login flow writes
    # actual rows, and we want the same code path the production demo
    # button takes.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root tooling (Playwright + Husky scaffolding)
        run: npm ci --no-fund --no-audit

      - name: Install server dependencies
        run: npm ci --no-fund --no-audit
        working-directory: server

      - name: Install client dependencies
        run: npm ci --no-fund --no-audit
        working-directory: client

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/worknest-e2e
          JWT_SECRET: e2e-jwt-secret
          JWT_REFRESH_SECRET: e2e-refresh-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
