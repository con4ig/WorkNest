name: E2E (Playwright)

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "client/**"
      - "server/**"
      - "e2e/**"
      - "playwright.config.js"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "client/**"
      - "server/**"
      - "e2e/**"
      - "playwright.config.js"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Start MongoDB Replica Set
        run: |
          docker run --name mongo -d -p 27017:27017 mongo:7 mongod --replSet rs0 --bind_ip_all
          echo "Waiting for MongoDB to start..."
          until docker exec mongo mongosh --eval "db.runCommand({ ping: 1 }).ok" --quiet; do
            sleep 1
          done
          echo "Initiating Replica Set..."
          docker exec mongo mongosh --eval "rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]})"
          until docker exec mongo mongosh --eval "rs.status().ok" --quiet; do
            sleep 1
          done
          echo "MongoDB is ready."

      - name: Install root tooling (Playwright + Husky scaffolding)
        run: npm ci --no-fund --no-audit

      - name: Install server dependencies
        run: npm ci --no-fund --no-audit
        working-directory: server

      - name: Install client dependencies
        run: npm ci --no-fund --no-audit
        working-directory: client

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/worknest-e2e
          JWT_SECRET: e2e-jwt-secret
          JWT_REFRESH_SECRET: e2e-refresh-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
