# Drop-in replacement for CodeQL on private repos.
# Rename this file to `semgrep.yml` (remove `.example`) to activate.
# Free for both public and private repos — no GHAS license required.

name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # Skip on Dependabot PRs — they don't carry the SARIF upload token.
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        # `auto` config picks the right rulesets for the languages it
        # detects (JavaScript/TypeScript, Node, Express, React, plus
        # OWASP Top 10 and security-audit packs).
        run: semgrep ci --config auto --sarif --output=semgrep.sarif || true

          # Optional: connect to Semgrep Cloud (semgrep.dev) for a
          # dashboard. Free tier; remove this env var to run purely in
          # CI without dashboard.
          # SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub
        # Without GHAS the Security tab won't render SARIF, but the
        # artifact is still attached to the run for download.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
