version: 2

updates:
  # Frontend
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - client
    commit-message:
      prefix: "deps(client)"
      include: scope
    groups:
      all-client-deps:
        patterns:
          - "*"

  # Backend
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - server
    commit-message:
      prefix: "deps(server)"
      include: scope
    groups:
      all-server-deps:
        patterns:
          - "*"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci)"
    groups:
      all-actions:
        patterns:
          - "*"

  # Docker base images
  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - docker
    groups:
      all-client-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - docker
    groups:
      all-server-docker:
        patterns:
          - "*"
