version: 2

updates:
  # Root tooling used by E2E and repo automation
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci)"
      include: scope
    ignore:
      - dependency-name: "@commitlint/cli"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@commitlint/config-conventional"
        update-types: ["version-update:semver-major"]
    groups:
      all-root-tooling:
        patterns:
          - "*"

  # Frontend
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - client
    commit-message:
      prefix: "deps(client)"
      include: scope
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-*"
        update-types: ["version-update:semver-major"]
    groups:
      all-client-deps:
        patterns:
          - "*"

  # Backend
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - server
    commit-message:
      prefix: "deps(server)"
      include: scope
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      all-server-deps:
        patterns:
          - "*"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci)"
    groups:
      all-actions:
        patterns:
          - "*"

  # Docker base images
  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    groups:
      all-client-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - docker
    groups:
      all-server-docker:
        patterns:
          - "*"
